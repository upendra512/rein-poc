<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rein PoC - WebRTC + Koffi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      touch-action: none;
      user-select: none;
    }

    .header {
      padding: 12px 16px;
      background: #16213e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 { font-size: 18px; font-weight: 600; }

    .status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .status.connected { background: #228B22; }
    .status.disconnected { background: #e74c3c; }
    .status.connecting { background: #f39c12; }

    .touchpad {
      flex: 1;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: none;
    }

    .touchpad-label {
      color: #ffffff33;
      font-size: 24px;
      pointer-events: none;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #16213e;
    }

    .controls button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-left { background: #228B22; color: white; }
    .btn-right { background: #e94560; color: white; }
    .btn-scroll { background: #533483; color: white; }
    .btn-mirror { background: #0f3460; color: white; border: 1px solid #228B22; }

    .controls button:active { opacity: 0.7; }

    .mirror-container {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: black;
    }

    .mirror-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .info {
      padding: 8px 16px;
      background: #0a0a1a;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Rein PoC</h1>
    <span id="status" class="status disconnected">Disconnected</span>
  </div>

  <div class="touchpad" id="touchpad">
    <span class="touchpad-label">Touch Area</span>
    <div class="mirror-container" id="mirror">
      <video id="mirrorVideo" autoplay playsinline muted></video>
    </div>
  </div>

  <div class="controls">
    <button class="btn-left" id="btnLeft">Left Click</button>
    <button class="btn-right" id="btnRight">Right Click</button>
    <button class="btn-scroll" id="btnScroll">Scroll Mode</button>
    <button class="btn-mirror" id="btnMirror">Mirror</button>
  </div>

  <div class="info">
    WebRTC DataChannel (unordered: mouse/scroll | ordered: keys/text) + Koffi FFI Input
  </div>

  <script src="webrtc-client.js"></script>
</body>
</html>
